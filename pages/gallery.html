<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Gallery</title>
  <link rel="stylesheet" href="../styles/gallery.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>

<div class="container">
  <aside class="sidebar">
    <h2 class="logo">Aura Gallery</h2>
    <p class="subtitle">THE DIGITAL CURATOR</p>

    <ul class="menu">
      <li><span class="material-symbols-outlined">photo_library</span>Library</li>
      <li><span class="material-symbols-outlined">collections_bookmark</span>Collections</li>
      <li><span class="material-symbols-outlined">search</span>Search</li>
      <li class="active"><span class="material-symbols-outlined">person</span>Profile</li>
    </ul>

    <div class="storage">Storage: 85% full</div>
  </aside>
  <main class="main">
    <header class="topbar">
      <a href="#">Upgrade Plan</a>

      <div class="top-actions">
        <span class="material-symbols-outlined">notifications</span>
        <span class="material-symbols-outlined">settings</span>
        <button class="upload-btn">Upload</button>
      </div>
    </header>
    <section class="hero">

      <div class="hero-image">
        <img 
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAP0UuCyWwPyjs0AvHZG0F1vOaNwouO8ChJaLHZYYkKSRHERwHQzgFyNU0aCIgNv3Uzom8CpXcWj2DF2wtQn7bg-Ub3HtmiBLkiwFfxRUPw8_3UpdaRIJ31Q_q10jVBk0u6c0Vv62CUQ6kgblhOY38-_7t9qAYJ45Z1LJjvepqzzoP29damd7I-wyOftPqq6uqfGLJwlo86TTLZM95Qt7sXWP6-aARhZ3cZ9y3ThMX3rr7AI7O3EtQDTeEjf_XSRvMH56ZnbljvfOet"
          alt="Profile"
          class="hero-img"
        />
      </div>

      <div class="hero-text">
        <h2>Elena Rossi</h2>
        <p>Creative Curator</p>
      </div>

    </section>

  </main>
</div>

</body>
</html>
